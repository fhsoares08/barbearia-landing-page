<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/horario.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <title>Agendar Horário</title>
</head>

<body>
    <div class="container">
        <form>
            <h1>Selecionar Horário</h1>
            <div class="input-containar">
                <input placeholder="Filial" type="text" required>
                <img width="20" height="20" src="https://img.icons8.com/ios/50/user--v1.png" alt="user--v1" />
            </div>
            
            <div class="input-containar">
                <input placeholder="Barbeiro" type="text" required>
                <img width="20" height="20" src="https://img.icons8.com/ios-filled/50/barber-pole.png" alt="barber-pole"/>
            </div>

            <div class="input-containar">
                <input placeholder="Data" type="datetime-local" required>
            </div>

            <button type="submit" class="submit-button">Agendar</button>

            <div class="register-link">
                <p>Não tem uma conta? <a href="../pages/cadastro.html">Cadastre-se</a></p>
            </div>
        </form>
    </div>

</body>

</html>
